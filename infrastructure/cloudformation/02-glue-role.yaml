AWSTemplateFormatVersion: "2010-09-09"
Description: IAM role for AWS Glue ETL jobs and crawlers

Parameters:
  ProjectName:
    Type: String
    Default: retail-intelligence

Resources:
  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-glue-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: !Sub "${ProjectName}-glue-s3-access"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${ProjectName}-raw-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::${ProjectName}-raw-${AWS::AccountId}/*"
                  - !Sub "arn:aws:s3:::${ProjectName}-curated-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::${ProjectName}-curated-${AWS::AccountId}/*"

Outputs:
  GlueRoleArn:
    Value: !GetAtt GlueServiceRole.Arn
    Export:
      Name: !Sub "${ProjectName}-glue-role-arn"