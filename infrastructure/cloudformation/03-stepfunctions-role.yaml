AWSTemplateFormatVersion: "2010-09-09"
Description: IAM role for Step Functions to orchestrate Glue jobs, invoke Lambda, and publish to SNS

Parameters:
  ProjectName:
    Type: String
    Default: retail-intelligence

Resources:
  StepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-stepfunctions-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${ProjectName}-sfn-orchestration-access"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - glue:StartJobRun
                  - glue:GetJobRun
                  - glue:GetJobRuns
                  - glue:BatchStopJobRun
                  - glue:StartCrawler
                  - glue:GetCrawler
                Resource: "*"
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:retail-intelligence-quality-checks"
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:retail-intelligence-alerts"

Outputs:
  StepFunctionsRoleArn:
    Value: !GetAtt StepFunctionsRole.Arn
    Export:
      Name: !Sub "${ProjectName}-stepfunctions-role-arn"