AWSTemplateFormatVersion: "2010-09-09"
Description: Streaming ingestion - Kinesis stream, SQS DLQ, and Lambda execution role

Parameters:
  ProjectName:
    Type: String
    Default: retail-intelligence

Resources:
  OrderStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub "${ProjectName}-order-stream"
      ShardCount: 1
      StreamModeDetails:
        StreamMode: PROVISIONED
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Dead-letter queue for records that fail processing after retries
  ConsumerDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-consumer-dlq"
      MessageRetentionPeriod: 1209600  # 14 days, max retention for investigation
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-stream-consumer-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub "${ProjectName}-consumer-permissions"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Read from the Kinesis stream
              - Effect: Allow
                Action:
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:DescribeStream
                  - kinesis:ListShards
                  - kinesis:ListStreams
                Resource: !GetAtt OrderStream.Arn
              # Write valid records to the streaming zone
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::${ProjectName}-raw-${AWS::AccountId}/streaming/*"
              # Send failed records to the DLQ (for on-failure destination)
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt ConsumerDLQ.Arn

Outputs:
  StreamArn:
    Value: !GetAtt OrderStream.Arn
    Export:
      Name: !Sub "${ProjectName}-order-stream-arn"
  StreamName:
    Value: !Ref OrderStream
  DLQArn:
    Value: !GetAtt ConsumerDLQ.Arn
    Export:
      Name: !Sub "${ProjectName}-consumer-dlq-arn"
  LambdaRoleArn:
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub "${ProjectName}-stream-consumer-role-arn"